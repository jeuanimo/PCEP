services:
  - type: web
    name: pcep-prep-coach
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn pcep_coach.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_HTTPS
        value: "True"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: pcep.onrender.com,localhost,127.0.0.1
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://pcep.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pcep-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pcep-redis
          type: redis
          property: connectionString

  - type: redis
    name: pcep-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: pcep-db
    plan: free
